name: Build & Push Production

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/ashok1995/kite-services

jobs:
  build-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: false

      - name: Install dependencies
        run: poetry install --without dev --no-interaction

      - name: Validate imports
        run: |
          python -c "import fastapi, kiteconnect, pandas, numpy; print('Deps OK')"
          python -c "import sys; sys.path.append('src'); from api.internal_market_context import router; print('Internal context route OK')"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:main-${{ github.sha }}

      - name: Summary
        run: |
          echo "✅ Production image pushed"
          echo "📦 ${{ env.IMAGE_NAME }}:latest"
          echo "🚀 Deploy on VM: ./deploy_to_prod.sh"
